name: Release Check

on:
  pull_request:
    branches:
      - main
    paths:
      - "package.json"
      - "CHANGELOG.md"
      - "src/**"
      - "bin/**"
      - "scripts/**"
      - ".github/workflows/**"
      - "bun.lock"

permissions:
  contents: read

jobs:
  release-check:
    name: Version, changelog, and package gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release version and changelog
        run: bun run release:validate

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format

      - name: Audit dependencies
        run: bun audit

      - name: Package dry-run
        run: npm pack --dry-run
