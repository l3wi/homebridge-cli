name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Tag, release, and publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Set up npm for trusted publishing
        run: |
          npm install -g npm@latest
          node --version
          npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read package metadata
        id: package
        run: |
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          NAME="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release version and changelog
        run: bun run release:validate

      - name: Ensure release tag does not already exist
        run: |
          TAG="${{ steps.package.outputs.tag }}"
          TAG_SHA=""
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            git fetch --force --depth=1 origin "refs/tags/$TAG:refs/tags/$TAG"
            TAG_SHA="$(git rev-list -n 1 "$TAG")"
          fi
          if [ -n "$TAG_SHA" ] && [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
            echo "Tag $TAG already exists at $TAG_SHA, expected $GITHUB_SHA."
            exit 1
          fi

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format

      - name: Audit dependencies
        run: bun audit

      - name: Package dry-run
        run: npm pack --dry-run

      - name: Extract release notes
        run: bun run release:notes > RELEASE_NOTES.md

      - name: Create GitHub release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.package.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.package.outputs.tag }} already exists."
            exit 0
          fi
          gh release create "${{ steps.package.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.package.outputs.tag }}" \
            --notes-file RELEASE_NOTES.md

      - name: Publish to npm
        run: npm publish --access public --provenance
